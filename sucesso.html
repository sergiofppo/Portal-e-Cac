<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal E-Cac - Guia Emitido com sucesso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="page-sucesso">
    <div class="root-sucesso">

        <header class="header-rf">
            <h1 class="header-title">ECac</h1>
            <div class="header-actions">
                <i class="fa-regular fa-bell" style="color: #6e7080; font-size: 18px;"></i>
                <img class="profile-avatar" src="https://i.pravatar.cc/80?img=12" alt="Perfil" style="width:35px;height:35px;">
            </div>
        </header>

        <main class="main-sucesso">
            <div class="success-card">

                <div class="success-icon-box">
                    <i class="fa-solid fa-check"></i>
                </div>

                <h2 class="success-title">Pagamento Confirmado</h2>
                <p class="success-message">Sucesso! O seu pagamento foi processado com segurança e já está registrado.</p>

                <div class="success-details-row">
                    <div class="detail-box">
                        <span class="detail-label">VALOR TOTAL</span>
                        <span class="detail-value">R$ 1.450,20</span>
                    </div>
                    <div class="detail-box">
                        <span class="detail-label">DATA</span>
                        <span class="detail-value blue-text">26 JUN<br>2026</span>
                    </div>
                </div>

                <button class="download-btn">
                    <i class="fa-solid fa-download"></i> Baixar Comprovante
                </button>

                <a href="index.html" class="home-btn">
                    <i class="fa-solid fa-house"></i> Voltar ao Início
                </a>

                <div class="auth-footer">
                    <i class="fa-solid fa-shield-halved"></i> Pagamento autenticado digitalmente
                </div>
            </div>

            <div class="help-link">
                Não recebeu o e-mail de confirmação? <a href="#">Clique aqui</a>
            </div>
        </main>

        <nav class="bottom-nav-bar">
          <a class="link" href="index.html">
            <span class="nav-icon"><i class="fa-solid fa-house"></i></span>
            <p class="text">Início</p>
          </a>
          <a class="link" href="emissao.html">
            <span class="nav-icon"><i class="fa-solid fa-list-check"></i></span>
            <p class="text">Serviços</p>
          </a>
          <a class="link" href="pagamento.html">
            <span class="nav-icon"><i class="fa-solid fa-certificate"></i></span>
            <p class="text">Pagamentos</p>
          </a>
          <a class="link active" href="sucesso.html">
            <span class="nav-icon"><i class="fa-solid fa-user"></i></span>
            <p class="text">Perfil</p>
          </a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
